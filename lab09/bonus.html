<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonus XML Employee Data</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }

        h1 {
            text-align: center;
            color: #7c0f65;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
        }

        th,
        td {
            text-align: left;
            padding: 10px;
        }

        tr:nth-child(even) {
            background-color: #b7f0cb;
        }

        th {
            background-color: #7c0f65;
            color: white;
        }

        .button {
            display: block;
            margin: auto;
            text-align: center;
            padding: 20px;
            border: 4px solid rgb(55, 12, 211);
            background: rgba(20, 192, 4, 0.5);
            color: rgb(230, 36, 78);
            border-radius: 30px;
            font-size: 28px;
            width: 400px;
            cursor: pointer;
        }

        .button:hover {
            background-color: white;
            color: black;
        }
    </style>

    <script>

        let showing = false;

        function toggleXMLData() {

            if (showing) {

                document.getElementById("id").innerHTML = "";

                document.getElementById("toggleButton").innerHTML =
                    "Get Employee Data";

                showing = false;

            } else {

                loadXMLDoc();
            }
        }

        function loadXMLDoc() {

            let xmlhttp = new XMLHttpRequest();

            xmlhttp.onreadystatechange = function () {

                if (this.readyState == 4 && this.status == 200) {

                    empDetails(this);

                    document.getElementById("toggleButton").innerHTML =
                        "Close Employee Data";

                    showing = true;
                }
            };

            xmlhttp.open("GET", "employee.xml", true);

            xmlhttp.send();
        }

        function empDetails(xml) {

            let i;

            let xmlDoc = xml.responseXML;

            let table =
                `<tr>
                    <th>Firstname</th>
                    <th>Lastname</th>
                    <th>Title</th>
                    <th>Division</th>
                    <th>Building</th>
                    <th>Room</th>
                </tr>`;

            let x = xmlDoc.getElementsByTagName("employee");

            for (i = 0; i < x.length; i++) {

                table += "<tr><td>" +

                    x[i].getElementsByTagName("firstname")[0]
                        .childNodes[0].nodeValue +

                    "</td><td>" +

                    x[i].getElementsByTagName("lastname")[0]
                        .childNodes[0].nodeValue +

                    "</td><td>" +

                    x[i].getElementsByTagName("title")[0]
                        .childNodes[0].nodeValue +

                    "</td><td>" +

                    x[i].getElementsByTagName("division")[0]
                        .childNodes[0].nodeValue +

                    "</td><td>" +

                    x[i].getElementsByTagName("building")[0]
                        .childNodes[0].nodeValue +

                    "</td><td>" +

                    x[i].getElementsByTagName("room")[0]
                        .childNodes[0].nodeValue +

                    "</td></tr>";
            }

            document.getElementById("id").innerHTML = table;
        }

    </script>

</head>

<body>

    <h1>Bonus Employee XML Data</h1>

    <button type="button" class="button" id="toggleButton" onclick="toggleXMLData()">

        Get Employee Data

    </button>

    <br><br>

    <table id="id"></table>

</body>

</html>
